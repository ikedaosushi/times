name: times
options:
  bundleIdPrefix: com.ikedaosushi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
settings:
  SWIFT_VERSION: "6.0"
targets:
  times:
    type: application
    platform: iOS
    sources:
      - times
    entitlements:
      path: times/times.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ikedaosushi.times
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.ikedaosushi.times
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ikedaosushi.times
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 5Y99TVMZQT
      INFOPLIST_GENERATION_MODE: GeneratedFile
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UIBackgroundModes: remote-notification
      SWIFT_EMIT_LOC_STRINGS: true
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "写真を日記に添付するためにフォトライブラリを使用します"
      INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "投稿に位置情報を追加するために位置情報を使用します"
      INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "音声入力でテキストを入力するために音声認識を使用します"
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "音声入力のためにマイクを使用します"
  timesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - timesTests
    dependencies:
      - target: times
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ikedaosushi.timesTests
      GENERATE_INFOPLIST_FILE: true
schemes:
  times:
    build:
      targets:
        times: all
    test:
      targets:
        - timesTests
